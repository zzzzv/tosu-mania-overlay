<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mania Result</title>
    <style>
      html, body {
        margin: 0;
        overflow: hidden;
        width: 800px;
        height: 400px;
      }
      #app {
        box-sizing: border-box;
        display: flex;
        position: relative;
        height: 100%;
        color: #ffffff;
        background: rgba(0, 33, 71, 0.8);
      }
      #timeline {
        flex: 1;
        height: 100%;
      }
      #status-panel {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        display: none;
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 10px;
        background: rgba(8, 24, 46, 0.78);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        color: rgba(244, 248, 255, 0.96);
        font-size: 15px;
        font-weight: 600;
        line-height: 1.45;
        white-space: pre-wrap;
        z-index: 10;
      }
      #status-panel.is-visible {
        display: block;
      }
      #status-panel.is-loading {
        border-color: rgba(121, 242, 231, 0.24);
        background: rgba(10, 38, 58, 0.74);
        color: rgba(233, 251, 255, 0.96);
      }
      #status-panel.is-error {
        border-color: rgba(255, 170, 170, 0.26);
        background: rgba(56, 22, 28, 0.7);
        color: rgba(255, 237, 240, 0.96);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="timeline"></div>
      <div id="status-panel"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
